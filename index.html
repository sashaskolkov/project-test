<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Hello World</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
  }
  h1 {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 8vw;
    color: #ffffff;
    letter-spacing: 0.05em;
    animation: blink 1s steps(1) infinite;
  }
  .subtitle {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 1.5vw;
    color: #999999;
    text-align: center;
    margin-top: 1em;
  }
  .subtitle cite {
    display: block;
    margin-top: 0.5em;
    font-style: normal;
    opacity: 0.7;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>
<body>
  <div>
    <h1>HELLO WORLD.</h1>
    <p class="subtitle">Вы любите розы? Стране нужны паровозы, нам нужен металл!<cite>— Алексей Губин</cite></p>
  </div>
</body>
</html>
