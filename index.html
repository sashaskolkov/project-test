<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Hello World</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
  }
  h1 {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 8vw;
    color: #ffffff;
    letter-spacing: 0.05em;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>
<body>
  <h1>HELLO WORLD.</h1>
</body>
</html>
